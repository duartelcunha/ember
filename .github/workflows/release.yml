name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Maintains the standing release PR; on merge, tags + publishes the GitHub Release.
  # Runs in the SAME workflow as the build below (not a separate tag-triggered one):
  # a tag created via GITHUB_TOKEN does not cascade to trigger other workflows, so a
  # `push: tags:` workflow would never fire for release-please's own tags.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify package.json and Cargo.toml versions are in sync
        run: npm run version:check

      # Gate the release on the test suite: never publish a build to auto-updating users
      # if the pure logic (retry/fallback, prompt, capture) or the shell tests fail.
      - name: Run tests
        run: cargo test --workspace

      # Typecheck the frontend before building the bundle (tauri-action runs `vite build`
      # via beforeBuildCommand, but this surfaces a tsc failure as its own clear step).
      - name: Typecheck frontend
        run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: 'Ember ${{ needs.release-please.outputs.tag_name }}'
          releaseDraft: false
          # Keep it a prerelease during upload (release-please created it as one). The updater
          # endpoint /releases/latest skips prereleases, so users stay on the last full release
          # until the installer + latest.json are actually attached below.
          prerelease: true

      # Only now that the artifacts exist, promote the release to the latest full release.
      # If the build failed above, this never runs and the release stays a prerelease, so
      # /releases/latest keeps pointing at the previous good version (no 404, no bad update).
      - name: Publish release now that artifacts are uploaded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.release-please.outputs.tag_name }}" --prerelease=false --latest --repo "${{ github.repository }}"
