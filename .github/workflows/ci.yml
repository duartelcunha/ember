name: ci

# Corre em cada PR e em cada push para main, para as regressoes nunca chegarem a um
# release. O release.yml corre os mesmos testes antes de publicar (defesa em profundidade).
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify package.json and Cargo.toml versions are in sync
        run: npm run version:check

      - name: Rust tests
        run: cargo test --workspace

      - name: Typecheck and build frontend
        run: npm run build
